<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Summit 2026 - Student Pass</title>
    <!-- <link rel="stylesheet" href="layout.css"/> -->
     <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            font-family:Verdana, Geneva, Tahoma, sans-serif;
            background-color: rgba(97, 115, 133, 0.278);
            color: #2d3784;
            padding: 40px 20px;
        }

        .event-pass-card{
            background: #fff;
            border-radius: 15px;
            /* border-radius: 50%; */
            border-left: 11px solid rgb(9, 86, 144);
            padding: 45px;
            max-width: 450px;
            margin: 15px auto;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .pass-header h3{
            color: #4a5455;
            font-size: 1.1em;
            text-transform: uppercase;
            letter-spacing: .4px;
        }

        .badge{
            background: #eef;
            color: #4c51bf;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: .6em;
            font-weight: bold;
        }

        .user-name{
            font-size: 1.5em;
            font-weight: 700;
            color: #1a202c;
            margin-top: 10px;
        }

        .user-role{
            font-size: 1.1em;
            font-weight: 500;
            color: #1a202c;
            margin-top: 15px;
        }

        /* magic layout css */
        .dashboard-container{
            display: flex;
            flex-direction: row;
            justify-content: center;
            gap: 25px;
        }

        .pass-header{
            display: flex;
            justify-content: space-between;
            background: #e5ebf2;
            align-items: center;
            border-bottom: 1px solid #8cabd3;
            padding: 10px 0;
        }

        .pass-meta{
            display: flex;
            justify-content: space-between;
            background: #e5ebf2;
            align-items: center;
            border-bottom: 1px solid #8cabd3;
            padding: 10px;
            border-radius: 10px;
            color: rgb(23, 114, 38);
            font-weight: 300;
        }


        .pass-footer{
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            border-top: 1px solid rgb(179, 226, 246);
            padding-top: 15px;
        }


        .action-btn{
            background-color: rgb(38, 154, 227);
            color: white;
            padding: 10px 15px;
            border-radius: 10px;
            border-width: 0;
            font-size: 1em;
            cursor: pointer;

            /* transform: scale(.5); */
        }

        /* Media Query */
        @media (max-width: 680px){
            body{
                padding: 20px 10px;
            }

            .dashboard-container{
                display: flex;
                flex-direction: column;
                
                background: rgba(0, 0, 0, 0.269);
            }
            .event-pass-card{
                width: 100%;
            }
        }
        /* @media (min-width: 681px) and (max-width: 700px){
            body{
                background: green;
            }
        } */

        /* Animation */
        @keyframes heart-beat-effect{
            0%{ transform: scale(1); }
            20%{ transform: scale(1.1); }
            40%{ transform: scale(1.2); }
            50%{ transform: scale(1.3); }
            60%{ transform: scale(1.2); }
            80%{ transform: scale(1.1); }
            100%{ transform: scale(1); }
        }

        .action-btn{
            animation: heart-beat-effect 1s ease-in-out infinite;
        }

     </style>
</head>
<body>

    <!-- Container Dashboard Wrapper -->
    <main class="dashboard-container">
        
        <!-- Individual Pass Card 1 -->
        <div class="event-pass-card">
            <header class="pass-header">
                <span class="badge">VIP Access</span>
                <h3>TechSummit 2026</h3>
            </header>
            
            <div class="pass-body">
                <p class="user-name">Aryan Sharma</p>
                <p class="user-role">Full-Stack Track Student</p>
                
                <div class="pass-meta">
                    <span class="date">June 15, 2026</span>
                    <span class="seat">Seat: Row A-12</span>
                </div>
            </div>
            
            <footer class="pass-footer">
                <span class="status-indicator">Confirmed</span>
                <button class="action-btn">Download Pass</button>
            </footer>
        </div>

        <!-- Individual Pass Card 2 (For Layout Practice) -->
        <div class="event-pass-card">
            <header class="pass-header">
                <span class="badge premium">General</span>
                <h3>TechSummit 2026</h3>
            </header>
            
            <div class="pass-body">
                <p class="user-name">Ananya Verma</p>
                <p class="user-role">UI/UX Track Student</p>
                
                <div class="pass-meta">
                    <span>June 15, 2026</span>
                    <span>Seat: Row C-04</span>
                </div>
            </div>
            
            <footer class="pass-footer">
                <span class="status-indicator">Confirmed</span>
                <button class="action-btn">Download Pass</button>
            </footer>
        </div>

    </main>

</body>
</html>
