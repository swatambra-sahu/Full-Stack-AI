<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Summit 2026 - Student Pass</title>
    <!-- <link rel="stylesheet" href="layout.css"/> -->
     <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            font-family:Verdana, Geneva, Tahoma, sans-serif;
            background-color: rgba(97, 115, 133, 0.278);
            color: #2d3784;
            padding: 40px 20px;
        }

        .event-pass-card{
            background: #fff;
            border-radius: 15px;
            /* border-radius: 50%; */
            border-left: 11px solid rgb(9, 86, 144);
            padding: 45px;
            max-width: 400px;
            margin: 15px auto;
        }
     </style>
</head>
<body>

    <!-- Container Dashboard Wrapper -->
    <main class="dashboard-container">
        
        <!-- Individual Pass Card 1 -->
        <div class="event-pass-card">
            <header class="pass-header">
                <span class="badge">VIP Access</span>
                <h3>TechSummit 2026</h3>
            </header>
            
            <div class="pass-body">
                <p class="user-name">Aryan Sharma</p>
                <p class="user-role">Full-Stack Track Student</p>
                
                <div class="pass-meta">
                    <span class="date">June 15, 2026</span>
                    <span class="seat">Seat: Row A-12</span>
                </div>
            </div>
            
            <footer class="pass-footer">
                <span class="status-indicator">Confirmed</span>
                <button class="action-btn">Download Pass</button>
            </footer>
        </div>

        <!-- Individual Pass Card 2 (For Layout Practice) -->
        <div class="event-pass-card">
            <header class="pass-header">
                <span class="badge premium">General</span>
                <h3>TechSummit 2026</h3>
            </header>
            
            <div class="pass-body">
                <p class="user-name">Ananya Verma</p>
                <p class="user-role">UI/UX Track Student</p>
                
                <div class="pass-meta">
                    <span>June 15, 2026</span>
                    <span>Seat: Row C-04</span>
                </div>
            </div>
            
            <footer class="pass-footer">
                <span class="status-indicator">Confirmed</span>
                <button class="action-btn">Download Pass</button>
            </footer>
        </div>

    </main>

</body>
</html>
